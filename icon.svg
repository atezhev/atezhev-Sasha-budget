<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0d0a1a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6eb4"/>
      <stop offset="100%" stop-color="#b57bee"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6eb4"/>
      <stop offset="50%" stop-color="#b57bee"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Soft glow blobs -->
  <circle cx="130" cy="130" r="120" fill="#ff6eb4" opacity="0.08"/>
  <circle cx="390" cy="380" r="140" fill="#5eead4" opacity="0.07"/>
  <circle cx="380" cy="140" r="90" fill="#b57bee" opacity="0.1"/>

  <!-- Outer ring -->
  <circle cx="256" cy="230" r="160" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>

  <!-- Arc 1 (pink→purple) -->
  <path d="M 256 70 A 160 160 0 1 1 100 310" fill="none" stroke="url(#g1)" stroke-width="22" stroke-linecap="round" filter="url(#glow)" opacity="0.95"/>
  <!-- Arc 2 (teal→purple) -->
  <path d="M 100 310 A 160 160 0 0 1 390 170" fill="none" stroke="url(#g2)" stroke-width="22" stroke-linecap="round" opacity="0.7"/>

  <!-- Center circle -->
  <circle cx="256" cy="230" r="88" fill="url(#bg)" stroke="url(#g1)" stroke-width="1.5" opacity="0.9"/>
  <!-- Gradient fill overlay -->
  <circle cx="256" cy="230" r="82" fill="url(#coin)" opacity="0.18"/>

  <!-- Ruble ₽ symbol -->
  <text x="256" y="264" text-anchor="middle"
    font-family="Georgia,serif" font-weight="700" font-size="90"
    fill="url(#g1)" filter="url(#glow)" opacity="0.95">₽</text>

  <!-- Bottom pill -->
  <rect x="128" y="392" width="256" height="52" rx="26" fill="url(#g1)" opacity="0.9"/>
  <text x="256" y="426" text-anchor="middle"
    font-family="Arial,sans-serif" font-weight="900" font-size="20"
    fill="white" letter-spacing="3" opacity="0.95">БЮДЖЕТ</text>

  <!-- Sparkle dots -->
  <circle cx="142" cy="128" r="5" fill="#ff6eb4" opacity="0.9" filter="url(#glow)"/>
  <circle cx="378" cy="108" r="4" fill="#5eead4" opacity="0.8" filter="url(#glow)"/>
  <circle cx="408" cy="345" r="6" fill="#b57bee" opacity="0.7" filter="url(#glow)"/>
  <circle cx="108" cy="348" r="4" fill="#fbbf24" opacity="0.7"/>
  <circle cx="415" cy="178" r="3" fill="#ff6eb4" opacity="0.6"/>
  <circle cx="165" cy="370" r="3" fill="#5eead4" opacity="0.6"/>
</svg>
