<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a3a"/>
      <stop offset="100%" style="stop-color:#0a1a2a"/>
    </linearGradient>
    <linearGradient id="arc1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c6bff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="arc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- grid lines -->
  <g opacity="0.05">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#fff" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#fff" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#fff" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- progress arc bg -->
  <circle cx="256" cy="220" r="148" fill="none" stroke="#ffffff08" stroke-width="26"/>
  <!-- arc 1 -->
  <path d="M 256 72 A 148 148 0 1 1 108 295" fill="none" stroke="url(#arc1)" stroke-width="26" stroke-linecap="round" filter="url(#glow)"/>
  <!-- arc 2 accent -->
  <path d="M 108 295 A 148 148 0 0 1 375 178" fill="none" stroke="url(#arc2)" stroke-width="26" stroke-linecap="round" opacity="0.8"/>
  <!-- coin -->
  <circle cx="256" cy="220" r="76" fill="url(#coin)" filter="url(#glow)"/>
  <circle cx="256" cy="220" r="66" fill="none" stroke="#ffffff25" stroke-width="3"/>
  <!-- ruble sign -->
  <text x="256" y="248" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="80" fill="#1a0a0a" opacity="0.85">₽</text>
  <!-- label pill -->
  <rect x="130" y="388" width="252" height="50" rx="25" fill="#7c6bff" opacity="0.92"/>
  <text x="256" y="421" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="21" fill="white" letter-spacing="2">БЮДЖЕТ</text>
  <!-- sparkles -->
  <circle cx="138" cy="118" r="5" fill="#7c6bff" opacity="0.9"/>
  <circle cx="374" cy="98" r="4" fill="#ff6b9d" opacity="0.8"/>
  <circle cx="398" cy="338" r="6" fill="#4ade80" opacity="0.7"/>
  <circle cx="110" cy="345" r="4" fill="#fbbf24" opacity="0.8"/>
  <circle cx="420" cy="160" r="3" fill="#a78bfa" opacity="0.7"/>
</svg>
